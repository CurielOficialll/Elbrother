<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elbrother POS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#37393d",
                        "on-tertiary-fixed-variant": "#832700",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e2e2e6",
                        "secondary-container": "#05f476",
                        "inverse-primary": "#006877",
                        "secondary-fixed": "#65ff90",
                        "secondary": "#c5ffca",
                        "on-primary-container": "#005f6d",
                        "tertiary-fixed-dim": "#ffb59c",
                        "surface-container-low": "#1a1c1f",
                        "outline": "#859397",
                        "surface-container-lowest": "#0c0e11",
                        "outline-variant": "#3b494c",
                        "on-primary-fixed": "#001f25",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#00e46d",
                        "on-surface-variant": "#bac9cd",
                        "on-tertiary-fixed": "#390c00",
                        "error": "#ffb4ab",
                        "surface-dim": "#111316",
                        "on-secondary-fixed-variant": "#005323",
                        "on-error": "#690005",
                        "on-tertiary": "#5c1900",
                        "on-secondary-container": "#006a2f",
                        "on-primary-fixed-variant": "#004e5a",
                        "surface-tint": "#00daf8",
                        "surface-container-high": "#282a2d",
                        "primary-fixed-dim": "#00daf8",
                        "on-tertiary-container": "#9d3100",
                        "surface-container": "#1e2023",
                        "surface": "#111316",
                        "on-secondary-fixed": "#00210a",
                        "on-primary": "#00363f",
                        "tertiary-fixed": "#ffdbcf",
                        "primary-container": "#00e0ff",
                        "primary-fixed": "#a5eeff",
                        "on-secondary": "#003916",
                        "surface-container-highest": "#333538",
                        "on-surface": "#e2e2e6",
                        "primary": "#baf2ff",
                        "inverse-on-surface": "#2f3034",
                        "tertiary": "#ffe2da",
                        "tertiary-container": "#ffbda7",
                        "surface-variant": "#333538",
                        "inverse-surface": "#e2e2e6",
                        "background": "#111316"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "8px",
                        "touch-target-min": "48px",
                        "gutter": "16px",
                        "card-padding": "20px",
                        "margin-edge": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "price-display": ["Space Grotesk"],
                        "headline-lg": ["Inter"],
                        "price-sm": ["Space Grotesk"],
                        "headline-xl": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["18px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "price-display": ["40px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "price-sm": ["20px", { "lineHeight": "1", "fontWeight": "600" }],
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center p-gutter antialiased">
<!-- Decorative ambient glow -->
<div class="fixed inset-0 pointer-events-none flex justify-center items-center overflow-hidden z-0">
<div class="w-[600px] h-[600px] bg-primary-container/5 rounded-full blur-3xl mix-blend-screen translate-y-[-20%]"></div>
</div>
<!-- Main Login Card (Level 1 Surface) -->
<main class="w-full max-w-md bg-surface-container-low rounded-xl p-8 flex flex-col gap-10 relative z-10 shadow-2xl border border-outline-variant/30">
<!-- Subtle Inner Glow Top Border -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-primary-container/20"></div>
<!-- Header / Logo -->
<div class="text-center flex flex-col gap-2">
<div class="inline-flex justify-center items-center w-16 h-16 rounded-full bg-surface-container-highest mx-auto mb-2 border border-primary-container/30">
<span class="material-symbols-outlined text-primary-container text-[32px]">storefront</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary-container uppercase tracking-tighter">ELBROTHER</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sistema de Punto de Venta</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Role Selection (Segmented Control) -->
<div class="flex bg-surface-container-highest p-1 rounded-lg border border-outline-variant/50">
<label class="flex-1 text-center cursor-pointer relative group">
<input class="peer sr-only" name="role" type="radio" value="admin"/>
<span class="block py-3 rounded-md font-label-caps text-label-caps text-on-surface-variant peer-checked:bg-surface peer-checked:text-primary-container peer-checked:ring-1 peer-checked:ring-primary-container/30 transition-all duration-200">
                        ADMINISTRADOR
                    </span>
</label>
<label class="flex-1 text-center cursor-pointer relative group">
<input checked="" class="peer sr-only" name="role" type="radio" value="cashier"/>
<span class="block py-3 rounded-md font-label-caps text-label-caps text-on-surface-variant peer-checked:bg-surface peer-checked:text-primary-container peer-checked:ring-1 peer-checked:ring-primary-container/30 transition-all duration-200">
                        CAJERO
                    </span>
</label>
</div>
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-primary-container" for="username">USUARIO</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">person</span>
<input class="w-full bg-surface-container-highest text-on-surface pl-12 pr-4 py-4 min-h-touch-target-min border-0 border-b-2 border-outline-variant focus:border-transparent focus:ring-0 focus:outline focus:outline-2 focus:outline-primary-container focus:-outline-offset-2 rounded-t-DEFAULT transition-all font-body-md text-body-md" id="username" placeholder="Ingresa tu ID" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-primary-container" for="password">CONTRASEÑA</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full bg-surface-container-highest text-on-surface pl-12 pr-12 py-4 min-h-touch-target-min border-0 border-b-2 border-outline-variant focus:border-transparent focus:ring-0 focus:outline focus:outline-2 focus:outline-primary-container focus:-outline-offset-2 rounded-t-DEFAULT transition-all font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary-container transition-colors p-1" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-surface-container-lowest font-headline-lg text-headline-lg py-4 min-h-[64px] rounded-lg mt-4 hover:bg-primary-fixed hover:scale-[0.98] active:scale-95 transition-all flex justify-center items-center gap-3" type="submit">
                INGRESAR
                <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
</form>
</main>
<!-- Footer System Status -->
<footer class="mt-8 flex flex-col items-center gap-3 z-10">
<div class="flex items-center gap-2 bg-surface-container px-4 py-2 rounded-full border border-outline-variant/30">
<span class="w-2.5 h-2.5 rounded-full bg-secondary-fixed shadow-[0_0_8px_rgba(101,255,144,0.6)]"></span>
<span class="font-label-caps text-label-caps text-on-surface tracking-wider">LOCAL-FIRST MODE ACTIVE</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">v2.4.1 (Stable Build)</span>
</footer>
</body></html>
